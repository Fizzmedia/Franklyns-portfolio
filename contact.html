  <section class="page-top">

    <p class="hero-desc">Have a project, an idea, or just want to say hi? My inbox is open.</p>

  <section class="contact-layout">
    <div class="contact-cards">
      <a href="mailto:franklynokoronkwo104@gmail.com" class="contact-card">

    <form class="contact-form" action="https://formsubmit.co/franklynokoronkwo104@gmail.com" method="POST">
      <label>
        <span>Name</span>
        <input type="text" name="name" placeholder="Your name" required>
      </label>
      <label>
        <span>Email</span>
        <input type="email" name="email" placeholder="you@example.com" required>
      </label>
      <label>
        <span>Message</span>
        <textarea rows="5" name="message" placeholder="What are you building?" required></textarea>
      </label>
      <button type="submit" class="btn-block">Send Message <i class="fas fa-arrow-right"></i></button>
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://fizzmedia.github.io/Franklyns-portfolio/">
    </form>
  </section>
